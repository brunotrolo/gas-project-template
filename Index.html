<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bob Esponja — Fenda do Biquíni</title>
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
      background: linear-gradient(180deg,
        #03203f 0%, #0a4a7c 26%, #1173ad 48%,
        #2a9cc9 66%, #51c2dd 78%, #7fd8e8 86%);
      position: relative;
    }

    /* ════════ Raios de luz ════════ */
    .ray {
      position: fixed; top: -12vh; width: 14vw; height: 70vh;
      background: linear-gradient(180deg, rgba(255,255,255,.28), rgba(255,255,255,0));
      transform-origin: top center;
      animation: raysway 9s ease-in-out infinite alternate;
      pointer-events: none; filter: blur(6px); z-index: 1;
    }
    .ray.r1 { left: 12%; transform: rotate(14deg); animation-delay: 0s; }
    .ray.r2 { left: 38%; transform: rotate(-6deg); animation-delay: 2.5s; width: 20vw; }
    .ray.r3 { left: 68%; transform: rotate(10deg); animation-delay: 1.2s; }
    @keyframes raysway {
      from { opacity: .35; transform: rotate(8deg); }
      to   { opacity: .14; transform: rotate(-8deg); }
    }

    /* ════════ Nuvens-flor (as flores do céu do desenho!) ════════ */
    .flower { position: fixed; pointer-events: none; z-index: 2; animation: drift linear infinite; opacity: .9; }
    .flower .c {
      position: absolute; border-radius: 50%;
      width: 46px; height: 46px; background: var(--fc, #6fd3e3);
    }
    .flower .c:nth-child(1) { left: 22px; top: -16px; }
    .flower .c:nth-child(2) { left: 46px; top: 2px; width: 40px; height: 40px; }
    .flower .c:nth-child(3) { left: 30px; top: 20px; width: 44px; height: 44px; }
    .flower .c:nth-child(4) { left: 2px;  top: 16px; width: 38px; height: 38px; }
    .flower .c:nth-child(5) { left: -10px; top: -4px; width: 40px; height: 40px; }
    .flower .c:nth-child(6) { left: 16px; top: 0px; width: 52px; height: 52px; filter: brightness(1.12); }
    @keyframes drift {
      from { transform: translateX(-160px) scale(var(--fs,1)); }
      to   { transform: translateX(110vw) scale(var(--fs,1)); }
    }
    .flower.f1 { top: 6%;  --fc: #79e0c9; --fs: 1;   animation-duration: 70s; }
    .flower.f2 { top: 13%; --fc: #f3a6c8; --fs: .7;  animation-duration: 95s;  animation-delay: -30s; }
    .flower.f3 { top: 3%;  --fc: #b9a6f3; --fs: .85; animation-duration: 110s; animation-delay: -60s; }
    .flower.f4 { top: 17%; --fc: #a6e07b; --fs: .55; animation-duration: 80s;  animation-delay: -15s; }
    .flower.f5 { top: 9%;  --fc: #ffd36b; --fs: .65; animation-duration: 120s; animation-delay: -85s; }

    /* ════════ Mundo (cenário escalável) ════════ */
    #world {
      position: fixed; left: 50%; bottom: 0;
      width: 1280px; height: 640px;
      transform: translateX(-50%) scale(var(--s, 1));
      transform-origin: bottom center;
      z-index: 3;
    }
    .plx { position: absolute; inset: 0; will-change: transform; }

    /* ── Areia ── */
    .sand {
      position: absolute; left: -20%; right: -20%; bottom: 0; height: 120px;
      background:
        radial-gradient(140% 110% at 18% 0%, #f0cf8d 0 38%, transparent 39%),
        radial-gradient(150% 130% at 75% 0%, #ecc77f 0 42%, transparent 43%),
        linear-gradient(180deg, #e8c178, #d9a95e);
      border-radius: 50% 50% 0 0 / 28px 28px 0 0;
      box-shadow: 0 -6px 24px rgba(0,0,0,.12);
    }
    .sand::after {
      content: ''; position: absolute; inset: 0;
      background-image:
        radial-gradient(circle at 12% 40%, rgba(140,100,40,.35) 0 2px, transparent 3px),
        radial-gradient(circle at 32% 70%, rgba(140,100,40,.3) 0 2px, transparent 3px),
        radial-gradient(circle at 56% 45%, rgba(140,100,40,.3) 0 2px, transparent 3px),
        radial-gradient(circle at 78% 65%, rgba(140,100,40,.35) 0 2px, transparent 3px),
        radial-gradient(circle at 92% 38%, rgba(140,100,40,.3) 0 2px, transparent 3px);
      background-size: 220px 90px;
    }

    /* ── Corais distantes ── */
    .coral { position: absolute; bottom: 96px; opacity: .55; }
    .coral .stem { position: absolute; bottom: 0; border-radius: 12px 12px 0 0; }
    .coral.c1 { left: 2%; }
    .coral.c1 .stem:nth-child(1) { left: 0;  width: 14px; height: 80px;  background: #c95f8e; transform: rotate(-8deg); }
    .coral.c1 .stem:nth-child(2) { left: 14px; width: 12px; height: 110px; background: #d4719c; }
    .coral.c1 .stem:nth-child(3) { left: 28px; width: 13px; height: 66px;  background: #b9537f; transform: rotate(9deg); }
    .coral.c2 { left: 55%; }
    .coral.c2 .stem:nth-child(1) { left: 0;  width: 12px; height: 70px; background: #7b68c9; transform: rotate(-10deg); }
    .coral.c2 .stem:nth-child(2) { left: 13px; width: 14px; height: 95px; background: #8d7ad6; }
    .coral.c2 .stem:nth-child(3) { left: 29px; width: 11px; height: 58px; background: #6a57b8; transform: rotate(11deg); }
    .coral.c3 { left: 96%; }
    .coral.c3 .stem:nth-child(1) { left: 0; width: 13px; height: 88px; background: #d98a4e; transform: rotate(-7deg); }
    .coral.c3 .stem:nth-child(2) { left: 14px; width: 12px; height: 64px; background: #c97a3e; transform: rotate(8deg); }
    .coral.c3 .stem:nth-child(3) { left: 26px; width: 14px; height: 100px; background: #e09a5e; }

    /* ── Algas ── */
    .weed {
      position: absolute; bottom: 70px;
      background: linear-gradient(180deg, #2fa05a, #1a6e3a);
      border-radius: 50% 50% 6px 6px;
      transform-origin: bottom center;
      animation: sway 3.4s ease-in-out infinite alternate;
    }
    @keyframes sway { from { transform: rotate(-11deg); } to { transform: rotate(11deg); } }
    .weed.w1 { left: 3%;  width: 16px; height: 95px; }
    .weed.w2 { left: 18%; width: 11px; height: 60px; animation-delay: .6s; }
    .weed.w3 { left: 43%; width: 13px; height: 72px; animation-delay: 1.1s; }
    .weed.w4 { left: 59%; width: 10px; height: 52px; animation-delay: .3s; }
    .weed.w5 { left: 79%; width: 15px; height: 86px; animation-delay: .9s; }
    .weed.w6 { left: 97%; width: 12px; height: 64px; animation-delay: 1.4s; }

    /* ════════ CASAS ════════ */
    .house { position: absolute; cursor: pointer; transition: transform .3s cubic-bezier(.34,1.56,.64,1); }
    .house:hover { transform: translateY(-8px) scale(1.03); }

    /* — Abacaxi do Bob — */
    .pineapple { left: 60px; bottom: 92px; width: 165px; height: 230px; }
    .pine-body {
      position: absolute; bottom: 0; width: 165px; height: 195px;
      background:
        repeating-linear-gradient(55deg,  rgba(140,70,0,.22) 0 3px, transparent 3px 26px),
        repeating-linear-gradient(-55deg, rgba(140,70,0,.22) 0 3px, transparent 3px 26px),
        linear-gradient(180deg, #ffa726, #f57f17);
      border-radius: 50% 50% 42% 42% / 58% 58% 30% 30%;
      box-shadow: inset -14px -10px 30px rgba(150,60,0,.35), 0 10px 18px rgba(0,0,0,.2);
    }
    .pine-leaf {
      position: absolute; bottom: 178px; width: 26px; height: 78px;
      background: linear-gradient(180deg, #66bb6a, #2e7d32);
      clip-path: polygon(50% 0%, 95% 100%, 5% 100%);
      transform-origin: bottom center;
    }
    .pine-leaf.l1 { left: 70px; height: 92px; }
    .pine-leaf.l2 { left: 46px; transform: rotate(-26deg); }
    .pine-leaf.l3 { left: 94px; transform: rotate(26deg); }
    .pine-leaf.l4 { left: 26px; height: 58px; transform: rotate(-48deg); }
    .pine-leaf.l5 { left: 112px; height: 58px; transform: rotate(48deg); }
    .pine-door {
      position: absolute; bottom: 0; left: 62px; width: 42px; height: 64px;
      background: #135b76; border-radius: 22px 22px 0 0;
      border: 4px solid #8d5524; border-bottom: none;
    }
    .pine-win {
      position: absolute; width: 34px; height: 34px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #9fe3f7, #1c7da0);
      border: 4px solid #8d5524;
    }
    .pine-win.a { left: 28px; bottom: 110px; }
    .pine-win.b { left: 102px; bottom: 92px; width: 28px; height: 28px; }

    /* — Moai do Lula Molusco — */
    .moai { left: 300px; bottom: 92px; width: 112px; height: 205px; }
    .moai-head {
      position: absolute; bottom: 0; width: 112px; height: 200px;
      background: linear-gradient(180deg, #8fa3b8, #5f7287);
      border-radius: 44px 44px 14px 14px;
      box-shadow: inset -12px -8px 26px rgba(20,30,50,.35), 0 10px 16px rgba(0,0,0,.2);
    }
    .moai-brow { position: absolute; top: 34px; left: 14px; width: 84px; height: 14px; background: #46586c; border-radius: 8px; }
    .moai-nose { position: absolute; top: 44px; left: 42px; width: 28px; height: 64px; background: #6e8092; border-radius: 12px 12px 16px 16px; box-shadow: inset -5px -4px 8px rgba(20,30,50,.3); }
    .moai-eye { position: absolute; top: 52px; width: 22px; height: 16px; background: #2c3a4a; border-radius: 50%; }
    .moai-eye.a { left: 16px; } .moai-eye.b { right: 16px; }
    .moai-ear { position: absolute; top: 60px; width: 14px; height: 52px; background: #54657a; border-radius: 8px; }
    .moai-ear.a { left: -8px; } .moai-ear.b { right: -8px; }
    .moai-mouth { position: absolute; top: 128px; left: 34px; width: 44px; height: 12px; background: #2c3a4a; border-radius: 8px; }
    .moai-door { position: absolute; bottom: 0; left: 38px; width: 36px; height: 50px; background: #1d2a38; border-radius: 18px 18px 0 0; }

    /* — Pedra do Patrick — */
    .rock { left: 480px; bottom: 92px; width: 130px; height: 64px; }
    .rock-body {
      position: absolute; bottom: 0; width: 130px; height: 62px;
      background: radial-gradient(120% 150% at 35% 0%, #9c6b3c, #6e4422);
      border-radius: 65px 65px 8px 8px;
      box-shadow: inset -10px -8px 18px rgba(40,20,5,.4), 0 8px 14px rgba(0,0,0,.2);
    }
    .rock-ant { position: absolute; top: -22px; left: 60px; width: 4px; height: 26px; background: #caa05a; border-radius: 4px; }
    .rock-ant::after { content: ''; position: absolute; top: -8px; left: -4px; width: 12px; height: 12px; border-radius: 50%; background: #ffd54f; }

    /* — Siri Cascudo — */
    .krusty { left: 880px; bottom: 92px; width: 215px; height: 215px; }
    .kk-roof {
      position: absolute; bottom: 130px; left: 6px; width: 200px; height: 60px;
      background: linear-gradient(180deg, #4db6ac, #00897b);
      clip-path: polygon(12% 0%, 88% 0%, 100% 100%, 0% 100%);
      box-shadow: inset 0 -8px 14px rgba(0,60,50,.35);
    }
    .kk-mast { position: absolute; bottom: 188px; left: 102px; width: 6px; height: 30px; background: #6d4c41; }
    .kk-flag { position: absolute; bottom: 204px; left: 108px; width: 30px; height: 14px; background: #ef5350; clip-path: polygon(0 0, 100% 50%, 0 100%); animation: flagwave 1.6s ease-in-out infinite alternate; transform-origin: left center; }
    @keyframes flagwave { from { transform: skewY(-6deg);} to { transform: skewY(6deg);} }
    .kk-hull {
      position: absolute; bottom: 0; width: 215px; height: 132px;
      background:
        repeating-linear-gradient(90deg, rgba(60,30,10,.25) 0 4px, transparent 4px 30px),
        linear-gradient(180deg, #a05a2c, #7a4019);
      border-radius: 18px 18px 10px 10px;
      box-shadow: inset -12px -10px 26px rgba(40,15,0,.35), 0 10px 16px rgba(0,0,0,.22);
    }
    .kk-sign {
      position: absolute; bottom: 142px; left: 38px; width: 138px; height: 44px;
      background: #ffca28; border: 4px solid #8d5524; border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Luckiest Guy', 'Comic Sans MS', cursive;
      font-size: 17px; color: #c62828; letter-spacing: 1px;
      text-shadow: 1px 1px 0 #fff; transform: rotate(-2deg); z-index: 2;
    }
    .kk-door { position: absolute; bottom: 0; left: 84px; width: 48px; height: 66px; background: radial-gradient(circle at 35% 30%, #b3e5fc, #4f8cb0); border: 4px solid #5d3414; border-bottom: none; border-radius: 10px 10px 0 0; }
    .kk-win { position: absolute; bottom: 70px; width: 36px; height: 36px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #b3e5fc, #4f8cb0); border: 4px solid #5d3414; }
    .kk-win.a { left: 24px; } .kk-win.b { right: 24px; }

    /* — Balde de Lixo — */
    .chum { left: 1160px; bottom: 92px; width: 105px; height: 150px; }
    .chum-bucket {
      position: absolute; bottom: 0; width: 105px; height: 105px;
      background: linear-gradient(180deg, #b0bec5, #78909c);
      clip-path: polygon(8% 0%, 92% 0%, 100% 100%, 0% 100%);
      box-shadow: inset -10px -8px 20px rgba(30,40,50,.4);
    }
    .chum-handle { position: absolute; bottom: 96px; left: 12px; width: 81px; height: 40px; border: 7px solid #90a4ae; border-bottom: none; border-radius: 44px 44px 0 0; }
    .chum-glove { position: absolute; bottom: 128px; left: 38px; font-size: 26px; transform: rotate(-12deg); }
    .chum-label {
      position: absolute; bottom: 46px; left: 10px; width: 85px;
      text-align: center; font-size: 11px; font-weight: bold; color: #263238;
      background: #eceff1; border-radius: 8px; padding: 3px 0; transform: rotate(1deg);
    }
    .chum-door { position: absolute; bottom: 0; left: 36px; width: 32px; height: 42px; background: #37474f; border-radius: 14px 14px 0 0; }

    /* ════════ PERSONAGENS ════════ */
    .char { position: absolute; bottom: 64px; cursor: pointer; transition: transform .28s cubic-bezier(.34,1.56,.64,1); z-index: 6; will-change: transform; }
    .char:hover { transform: translateY(-12px); }
    .pupil { position: absolute; border-radius: 50%; background: #111; transition: background .2s; }

    /* — BOB ESPONJA — */
    .bob { left: 175px; width: 140px; height: 185px; animation: idlebob 2.6s ease-in-out infinite alternate; }
    @keyframes idlebob { from { margin-bottom: 0; } to { margin-bottom: 10px; } }
    .bob:hover { transform: translateY(-14px) rotate(-4deg); }
    .bob.flip { animation: bobflip .9s ease; }
    @keyframes bobflip {
      0% { transform: translateY(0) rotate(0); }
      45% { transform: translateY(-70px) rotate(190deg); }
      100% { transform: translateY(0) rotate(360deg); }
    }
    .bob-body {
      position: absolute; top: 0; left: 10px; width: 120px; height: 128px;
      background:
        radial-gradient(circle at 16% 22%, #d9c225 0 8px, transparent 9px),
        radial-gradient(circle at 82% 16%, #d9c225 0 6px, transparent 7px),
        radial-gradient(circle at 8% 70%, #d9c225 0 7px, transparent 8px),
        radial-gradient(circle at 92% 62%, #d9c225 0 8px, transparent 9px),
        radial-gradient(circle at 50% 6%, #d9c225 0 5px, transparent 6px),
        linear-gradient(160deg, #fff176, #ffeb3b 55%, #fbc02d);
      border: 3px solid #b8860b;
      border-radius: 22% 18% 20% 24% / 20% 24% 18% 22%;
      box-shadow: 0 8px 14px rgba(0,0,0,.18);
    }
    .bob-eye {
      position: absolute; top: 26px; width: 42px; height: 42px;
      background: #fff; border: 2px solid #9e9d24; border-radius: 50%;
    }
    .bob-eye.a { left: 14px; } .bob-eye.b { left: 60px; }
    .bob-iris { position: absolute; top: 12px; left: 12px; width: 18px; height: 18px; border-radius: 50%; background: #42a5f5; }
    .bob .pupil { top: 5px; left: 5px; width: 8px; height: 8px; }
    .bob-lash { position: absolute; top: -8px; left: 18px; width: 3px; height: 9px; background: #333; border-radius: 2px; box-shadow: -10px 2px 0 #333, 10px 2px 0 #333; }
    .bob-nose {
      position: absolute; top: 58px; left: 53px; width: 13px; height: 30px;
      background: linear-gradient(180deg, #ffee58, #f9a825);
      border: 2px solid #b8860b; border-radius: 40% 40% 50% 50%;
    }
    .bob-cheek { position: absolute; top: 74px; width: 8px; height: 8px; border-radius: 50%; background: #f48fb1; }
    .bob-cheek.a { left: 12px; } .bob-cheek.b { right: 12px; }
    .bob-cheek::after { content: ''; position: absolute; top: -3px; left: 10px; width: 3px; height: 3px; border-radius: 50%; background: #8d6e63; box-shadow: 3px 6px 0 #8d6e63, -2px 8px 0 #8d6e63; }
    .bob-smile {
      position: absolute; top: 76px; left: 28px; width: 64px; height: 34px;
      border: 4px solid #7a3b00; border-top: none;
      border-radius: 0 0 64px 64px / 0 0 40px 40px;
    }
    .bob-teeth { position: absolute; top: 100px; left: 47px; width: 26px; height: 16px; display: flex; gap: 2px; }
    .bob-teeth span { flex: 1; background: #fff; border: 2px solid #cfd8dc; border-top: none; border-radius: 0 0 4px 4px; }
    .bob-pants { position: absolute; top: 128px; left: 10px; width: 120px; height: 30px; background: linear-gradient(180deg, #fff 0 10px, #795548 10px); border: 3px solid #4e342e; border-top: none; border-radius: 0 0 8px 8px; }
    .bob-tie { position: absolute; top: 130px; left: 60px; width: 18px; height: 22px; background: #e53935; clip-path: polygon(50% 0, 100% 30%, 50% 100%, 0 30%); z-index: 2; }
    .bob-leg { position: absolute; top: 158px; width: 9px; height: 20px; background: #ffeb3b; border: 2px solid #b8860b; }
    .bob-leg.a { left: 44px; } .bob-leg.b { left: 84px; }
    .bob-shoe { position: absolute; top: 176px; width: 26px; height: 11px; background: #212121; border-radius: 8px 10px 2px 2px; }
    .bob-shoe.a { left: 36px; } .bob-shoe.b { left: 76px; }
    .bob-arm { position: absolute; top: 96px; width: 8px; height: 42px; background: #ffeb3b; border: 2px solid #b8860b; border-radius: 6px; }
    .bob-arm.a { left: -2px; transform: rotate(24deg); }
    .bob-arm.b { right: -2px; transform: rotate(-24deg); }

    /* — GARY — */
    .gary { left: 330px; bottom: 66px; width: 78px; height: 64px; }
    .gary:hover { transform: translateY(-6px) rotate(-5deg); }
    .gary-shell {
      position: absolute; top: 0; right: 0; width: 46px; height: 46px; border-radius: 50%;
      background: repeating-radial-gradient(circle at 56% 48%, #f8bbd0 0 5px, #ec407a 5px 11px);
      border: 3px solid #ad1457; box-shadow: 0 5px 8px rgba(0,0,0,.2);
    }
    .gary-body { position: absolute; bottom: 0; left: 0; width: 64px; height: 22px; background: linear-gradient(180deg, #81d4fa, #4fa8d8); border-radius: 14px 8px 6px 6px; }
    .gary-stalk { position: absolute; bottom: 18px; width: 4px; height: 26px; background: #4fa8d8; border-radius: 4px; transform-origin: bottom center; }
    .gary-stalk.a { left: 8px; transform: rotate(-10deg); }
    .gary-stalk.b { left: 20px; transform: rotate(8deg); }
    .gary-eye { position: absolute; top: -13px; left: -5px; width: 14px; height: 14px; background: #fff; border: 2px solid #4fa8d8; border-radius: 50%; }
    .gary .pupil { top: 3px; left: 3px; width: 5px; height: 5px; background: #c62828; }

    /* — LULA MOLUSCO — */
    .squid { left: 440px; width: 96px; height: 196px; }
    .squid:hover { transform: translateY(-8px) rotate(2deg); }
    .squid:hover .squid-head { transform: rotate(-4deg); }
    .squid-head {
      position: absolute; top: 0; left: 18px; width: 60px; height: 74px;
      background: linear-gradient(160deg, #b2dfdb, #80cbc4);
      border-radius: 48% 48% 42% 42%; border: 2px solid #4f9a94;
      transition: transform .3s; z-index: 2;
    }
    .squid-eye { position: absolute; top: 20px; width: 25px; height: 19px; background: #fdf6e3; border: 2px solid #4f9a94; border-radius: 50%; overflow: hidden; }
    .squid-eye.a { left: 2px; } .squid-eye.b { right: 2px; }
    .squid-eye::before { content: ''; position: absolute; top: -2px; left: -2px; right: -2px; height: 9px; background: #80cbc4; border-bottom: 2px solid #4f6a64; }
    .squid .pupil { top: 7px; left: 8px; width: 7px; height: 10px; border-radius: 4px; background: #6d2814; }
    .squid-nose { position: absolute; top: 36px; left: 21px; width: 17px; height: 42px; background: linear-gradient(180deg, #a5d6cd, #7cbcb2); border: 2px solid #4f9a94; border-radius: 40% 40% 55% 55%; z-index: 3; }
    .squid-mouth { position: absolute; top: 86px; left: 32px; width: 30px; height: 10px; border: 3px solid #4f6a64; border-top: none; border-radius: 0 0 22px 22px; transform: rotate(180deg); z-index: 2; }
    .squid-shirt { position: absolute; top: 96px; left: 14px; width: 68px; height: 52px; background: linear-gradient(180deg, #a1887f, #8d6e63); border: 2px solid #5d4037; border-radius: 12px 12px 6px 6px; }
    .squid-shirt::after { content: ''; position: absolute; top: 14px; left: 24px; width: 16px; height: 16px; border-radius: 50%; border: 3px solid #5d4037; border-top: none; transform: rotate(45deg); }
    .squid-leg { position: absolute; top: 144px; width: 11px; height: 50px; background: linear-gradient(180deg, #b2dfdb, #80cbc4); border: 2px solid #4f9a94; border-radius: 6px 6px 14px 14px; transform-origin: top center; }

      <div class="char sandy" data-say="Eita, peixinho! 🥋|Lá no Texas a gente faz assim! 🤠|Karatê! Hi-yah! ✊">
        <div class="sandy-tail"></div>
        <div class="sandy-leg a"></div><div class="sandy-leg b"></div>
        <div class="sandy-suit"></div>
        <div class="sandy-belt"></div>
        <div class="sandy-arm a"></div><div class="sandy-arm b"></div>
        <div class="sandy-face">
          <div class="sandy-eye a"><div class="pupil"></div></div>
          <div class="sandy-eye b"><div class="pupil"></div></div>
          <div class="sandy-nose"></div>
          <div class="sandy-teeth"></div>
        </div>
        <div class="sandy-helmet"></div>
        <div class="sandy-flower">🌸</div>
      </div>

      <div class="char krabs" data-say="Eu sinto cheiro de DINHEIRO! 🤑|Bem-vindo ao Siri Cascudo! 🦀|Me dá meu dinheiro!!">
        <div class="krabs-stalk a"><div class="krabs-eye"><div class="pupil money"></div><div class="cash">$</div></div></div>
        <div class="krabs-stalk b"><div class="krabs-eye"><div class="pupil money"></div><div class="cash">$</div></div></div>
        <div class="krabs-leg l1"></div><div class="krabs-leg l2"></div>
        <div class="krabs-leg l3"></div><div class="krabs-leg l4"></div>
        <div class="krabs-pants"></div>
        <div class="krabs-body"><div class="krabs-smile"></div></div>
        <div class="krabs-belt"></div>
        <div class="krabs-claw a"></div><div class="krabs-claw b"></div>
      </div>

      <div class="char plank" data-say="A fórmula secreta SERÁ minha! 😈|Eu fui pra FACULDADE!|1% maldade, 99% gênio do mal.">
        <div class="plank-ant a"></div><div class="plank-ant b"></div>
        <div class="plank-body">
          <div class="plank-eye"><div class="pupil"></div></div>
          <div class="plank-mouth"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="speech"></div>
  <div id="hint">🫧 mexa o mouse • clique nas 🪼 águas-vivas • clique no Bob 🧽</div>
  <div id="credit">🧽 Fenda do Biquíni · GitHub → Apps Script</div>

  <script>
    (function () {
      'use strict';
      var W = window, D = document;
      var world = D.getElementById('world');
      var mx = W.innerWidth / 2, my = W.innerHeight / 2;   // posição do mouse (px)
      var nmx = 0, nmy = 0;                                 // normalizado -1..1
      var jellyCaught = 0, bubPopped = 0;

      /* ── Título letra a letra ── */
      var titleStr = 'Fenda do Biquíni';
      var h1 = D.getElementById('titletext');
      for (var i = 0; i < titleStr.length; i++) {
        var s = D.createElement('span');
        s.textContent = titleStr[i] === ' ' ? ' ' : titleStr[i];
        s.style.animationDelay = (i * 0.09) + 's';
        h1.appendChild(s);
      }

      /* ── Escala responsiva do mundo ── */
      function setScale() {
        var s = Math.min(1, W.innerWidth / 1320, W.innerHeight / 780);
        world.style.setProperty('--s', Math.max(0.42, s).toFixed(3));
      }
      setScale();
      W.addEventListener('resize', setScale);

      /* ── Som (WebAudio, sintetizado — sem arquivos) ── */
      var actx = null;
      function audio() {
        if (!actx) { try { actx = new (W.AudioContext || W.webkitAudioContext)(); } catch (e) {} }
        return actx;
      }
      function pop(freq, dur) {
        var a = audio(); if (!a) return;
        try {
          var o = a.createOscillator(), g = a.createGain();
          o.type = 'sine';
          o.frequency.setValueAtTime(freq, a.currentTime);
          o.frequency.exponentialRampToValueAtTime(freq * 0.4, a.currentTime + dur);
          g.gain.setValueAtTime(0.12, a.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
          o.connect(g); g.connect(a.destination);
          o.start(); o.stop(a.currentTime + dur);
        } catch (e) {}
      }

      /* ── Bolhas ── */
      var MAXBUB = 46, bubCount = 0;
      function bubble(x, y, size, dx, dy, dur) {
        if (bubCount >= MAXBUB) return;
        bubCount++;
        var b = D.createElement('div');
        b.className = 'bub';
        b.style.left = (x - size / 2) + 'px';
        b.style.top = (y - size / 2) + 'px';
        b.style.width = b.style.height = size + 'px';
        b.style.setProperty('--dx', dx + 'px');
        b.style.setProperty('--dy', dy + 'px');
        b.style.setProperty('--d', dur + 's');
        D.body.appendChild(b);
        setTimeout(function () { b.remove(); bubCount--; }, dur * 1000);
      }
      function burst(x, y, n) {
        for (var i = 0; i < n; i++) {
          bubble(x, y, 6 + Math.random() * 16,
            (Math.random() - 0.5) * 160, -90 - Math.random() * 200,
            1.2 + Math.random() * 1.4);
        }
        bubPopped += n;
        D.getElementById('cbub').textContent = bubPopped;
      }

      /* ── Rastro de bolhas do mouse ── */
      var lastX = mx, lastY = my;
      function trail(x, y) {
        var dx = x - lastX, dy = y - lastY;
        if (dx * dx + dy * dy > 1400) {
          lastX = x; lastY = y;
          bubble(x + (Math.random() - 0.5) * 14, y + (Math.random() - 0.5) * 14,
            4 + Math.random() * 9, (Math.random() - 0.5) * 50,
            -60 - Math.random() * 120, 1.6 + Math.random());
        }
      }

      function setMouse(x, y) {
        mx = x; my = y;
        nmx = (x / W.innerWidth) * 2 - 1;
        nmy = (y / W.innerHeight) * 2 - 1;
        trail(x, y);
      }
      D.addEventListener('mousemove', function (e) { setMouse(e.clientX, e.clientY); });
      D.addEventListener('touchmove', function (e) {
        if (e.touches.length) setMouse(e.touches[0].clientX, e.touches[0].clientY);
      }, { passive: true });

      D.addEventListener('pointerdown', function (e) {
        audio();
        if (e.target.closest('.jelly')) return;
        burst(e.clientX, e.clientY, 7);
        pop(520 + Math.random() * 240, 0.14);
      });

      /* ── Balão de fala ── */
      var speech = D.getElementById('speech'), speechTimer = null, hideTimer = null;
      function say(el, txt) {
        clearTimeout(hideTimer);
        var r = el.getBoundingClientRect();
        speech.textContent = txt;
        speech.classList.add('show');
        var x = Math.max(8, Math.min(W.innerWidth - 268, r.left + r.width / 2 - 60));
        var y = Math.max(8, r.top - speech.offsetHeight - 26);
        speech.style.left = x + 'px';
        speech.style.top = y + 'px';
        // reposiciona depois que o texto define a altura real
        requestAnimationFrame(function () {
          speech.style.top = Math.max(8, r.top - speech.offsetHeight - 26) + 'px';
        });
      }
      function hideSpeech(delay) {
        clearTimeout(hideTimer);
        hideTimer = setTimeout(function () { speech.classList.remove('show'); }, delay || 140);
      }
      var talkers = D.querySelectorAll('[data-say]');
      for (var t = 0; t < talkers.length; t++) {
        (function (el) {
          var lines = el.getAttribute('data-say').split('|');
          function talk() { say(el, lines[Math.floor(Math.random() * lines.length)]); }
          el.addEventListener('mouseenter', function () { talk(); pop(700, 0.07); });
          el.addEventListener('mouseleave', function () { hideSpeech(160); });
          el.addEventListener('click', function (e) {
            e.stopPropagation();
            talk(); hideSpeech(2200);
            burst(e.clientX || 0, e.clientY || 0, 5);
            pop(620, 0.12);
          });
        })(talkers[t]);
      }

      /* ── Bob: clique = cambalhota + FESTA ── */
      var bob = D.getElementById('bob');
      bob.addEventListener('click', function () {
        bob.classList.remove('flip');
        void bob.offsetWidth;
        bob.classList.add('flip');
        world.classList.add('party');
        say(bob, 'FESTA NA FENDA! 🎉🧽');
        hideSpeech(2600);
        pop(880, 0.18); pop(660, 0.22);
        var r = bob.getBoundingClientRect();
        burst(r.left + r.width / 2, r.top + 20, 14);
        setTimeout(function () { world.classList.remove('party'); }, 3600);
      });

      /* ── Olhos que seguem o mouse ── */
      var pupils = [];
      var pupilEls = D.querySelectorAll('.pupil');
      for (var p = 0; p < pupilEls.length; p++) pupils.push(pupilEls[p]);
      function movePupils() {
        for (var i = 0; i < pupils.length; i++) {
          var el = pupils[i];
          var pr = el.parentElement.getBoundingClientRect();
          var cx = pr.left + pr.width / 2, cy = pr.top + pr.height / 2;
          var ang = Math.atan2(my - cy, mx - cx);
          var dist = Math.min(pr.width / 4 + 1.5, Math.hypot(mx - cx, my - cy) / 14);
          el.style.transform = 'translate(' + (Math.cos(ang) * dist).toFixed(1) + 'px,' + (Math.sin(ang) * dist).toFixed(1) + 'px)';
        }
      }

      /* ── Parallax das camadas ── */
      var layers = D.querySelectorAll('.plx');
      function parallax() {
        for (var i = 0; i < layers.length; i++) {
          var d = +layers[i].getAttribute('data-depth');
          layers[i].style.transform = 'translate(' + (-nmx * d).toFixed(1) + 'px,' + (-nmy * d * 0.4).toFixed(1) + 'px)';
        }
      }

      /* ── Águas-vivas ── */
      var jellies = [];
      function spawnJelly(first) {
        var el = D.createElement('div');
        el.className = 'jelly';
        el.innerHTML = '<div class="jelly-dome"></div><div class="jelly-t t1"></div><div class="jelly-t t2"></div><div class="jelly-t t3"></div><div class="jelly-t t4"></div>';
        D.body.appendChild(el);
        var j = {
          el: el,
          x: first ? Math.random() * W.innerWidth : (Math.random() < 0.5 ? -70 : W.innerWidth + 70),
          y: 80 + Math.random() * (W.innerHeight * 0.55),
          vx: 0, vy: 0,
          phase: Math.random() * Math.PI * 2,
          speed: 0.35 + Math.random() * 0.45,
          dir: Math.random() < 0.5 ? 1 : -1,
          alive: true
        };
        el.addEventListener('pointerdown', function (e) {
          e.stopPropagation();
          if (!j.alive) return;
          j.alive = false;
          el.classList.add('zap');
          el.classList.add('caught');
          jellyCaught++;
          D.getElementById('cjelly').textContent = jellyCaught;
          pop(980, 0.1); pop(1320, 0.16);
          burst(j.x + 26, j.y + 20, 6);
          var f = D.createElement('div');
          f.className = 'floatpt'; f.textContent = '+1 🪼';
          f.style.left = j.x + 'px'; f.style.top = (j.y - 10) + 'px';
          D.body.appendChild(f);
          setTimeout(function () { f.remove(); }, 1000);
          setTimeout(function () {
            el.remove();
            jellies.splice(jellies.indexOf(j), 1);
            spawnJelly(false);
          }, 480);
        });
        jellies.push(j);
      }
      for (var jn = 0; jn < 6; jn++) spawnJelly(true);

      function moveJellies(dt) {
        for (var i = 0; i < jellies.length; i++) {
          var j = jellies[i];
          if (!j.alive) continue;
          j.phase += dt * 0.002;
          j.vx += j.dir * 0.012;
          j.vy += Math.cos(j.phase) * 0.05;
          // foge do mouse (tímida, mas charmosa)
          var dx = (j.x + 26) - mx, dy = (j.y + 20) - my;
          var d2 = dx * dx + dy * dy;
          if (d2 < 16900) {
            var d = Math.sqrt(d2) || 1;
            j.vx += (dx / d) * 0.5;
            j.vy += (dy / d) * 0.5;
          }
          j.vx *= 0.965; j.vy *= 0.96;
          j.x += j.vx * j.speed * dt * 0.09;
          j.y += (j.vy + Math.sin(j.phase) * 0.5) * j.speed * dt * 0.075;
          if (j.x < -90) { j.x = -90; j.dir = 1; }
          if (j.x > W.innerWidth + 90) { j.x = W.innerWidth + 90; j.dir = -1; }
          if (j.x < -80 || j.x > W.innerWidth + 80) j.dir *= 1;
          if (j.y < 60) { j.y = 60; j.vy = Math.abs(j.vy); }
          var maxY = W.innerHeight * 0.72;
          if (j.y > maxY) { j.y = maxY; j.vy = -Math.abs(j.vy); }
          j.el.style.transform = 'translate(' + j.x.toFixed(1) + 'px,' + j.y.toFixed(1) + 'px) rotate(' + (j.vx * 3).toFixed(1) + 'deg)';
        }
      }

      /* ── Loop principal ── */
      var last = performance.now();
      function loop(now) {
        var dt = Math.min(48, now - last);
        last = now;
        movePupils();
        parallax();
        moveJellies(dt);
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);

      /* ── Bolhas ambientes sobem sozinhas ── */
      setInterval(function () {
        bubble(Math.random() * W.innerWidth, W.innerHeight + 30,
          5 + Math.random() * 12, (Math.random() - 0.5) * 60,
          -W.innerHeight * (0.5 + Math.random() * 0.5), 4 + Math.random() * 3);
      }, 900);
    })();
  </script>
</body>
</html>
